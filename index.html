<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LYNX Whiteboard University — ASI Solutions</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --dark: #213c44;
    --med: #125960;
    --light: #109aa9;
    --amber: #ffa100;
    --green: #4B954C;
    --yellow: #f1d336;
    --bg: #f4f6f7;
    --surface: #ffffff;
    --text: #1a2e33;
    --muted: #5a7177;
    --border: #dde4e6;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :focus-visible { outline: 2px solid var(--light); outline-offset: 2px; }
  body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  
  /* Gradient stripe */
  .gradient-bar { height: 5px; background: linear-gradient(90deg, var(--light) 0%, var(--green) 40%, var(--yellow) 70%, var(--amber) 100%); }

  /* Header */
  header { background: var(--dark); padding: 0 32px; display: flex; align-items: center; justify-content: space-between; height: 64px; position: sticky; top: 0; z-index: 100; }
  .logo { display: flex; align-items: center; gap: 16px; }
  .logo-asi { font-family: 'Poppins', sans-serif; font-weight: 700; font-size: 24px; color: var(--light); letter-spacing: 2px; }
  .logo-divider { width: 1px; height: 32px; background: rgba(255,255,255,0.2); }
  .logo-text { }
  .logo-sub { font-size: 9px; font-weight: 600; letter-spacing: 3px; text-transform: uppercase; color: var(--light); line-height: 1; }
  .logo-title { font-family: 'Poppins', sans-serif; font-size: 15px; font-weight: 600; color: white; }
  .header-progress { text-align: right; }
  .header-progress-label { font-size: 10px; color: rgba(255,255,255,0.4); text-transform: uppercase; letter-spacing: 1px; }
  .header-progress-count { font-family: 'Poppins', sans-serif; font-size: 18px; font-weight: 600; color: var(--light); }

  /* Progress bar */
  .progress-strip { background: var(--med); padding: 10px 32px; display: flex; align-items: center; gap: 16px; }
  .progress-track { flex: 1; height: 6px; background: rgba(255,255,255,0.15); border-radius: 3px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--light); border-radius: 3px; transition: width 0.5s ease; }
  .progress-pct { font-size: 11px; font-weight: 500; color: rgba(255,255,255,0.6); white-space: nowrap; min-width: 80px; text-align: right; }

  /* Course tabs */
  .course-tabs { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 32px; display: flex; gap: 0; overflow-x: auto; -webkit-overflow-scrolling: touch; scroll-snap-type: x proximity; scrollbar-width: none; }
  .course-tabs::-webkit-scrollbar { display: none; }
  .course-tab { padding: 14px 20px; border: none; background: none; cursor: pointer; font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 400; color: var(--muted); border-bottom: 3px solid transparent; margin-bottom: -1px; white-space: nowrap; display: flex; align-items: center; gap: 8px; transition: color 0.15s; scroll-snap-align: start; }
  .course-tab:hover { color: var(--text); }
  .course-tab.active { font-weight: 600; border-bottom-color: var(--tab-color, var(--light)); color: var(--tab-color, var(--light)); }
  .tab-badge { font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 20px; }
  .course-tab.active .tab-badge { background: var(--tab-color, var(--light)); color: white; }
  .course-tab:not(.active) .tab-badge { background: #eef1f2; color: var(--muted); }

  /* Course header */
  .course-header { padding: 16px 32px; border-bottom: 1px solid var(--border); }
  .course-header-inner { display: flex; align-items: center; gap: 12px; }
  .course-color-bar { width: 4px; height: 40px; border-radius: 2px; flex-shrink: 0; }
  .course-header-title { font-family: 'Poppins', sans-serif; font-size: clamp(14px, 2.5vw, 16px); font-weight: 600; color: var(--text); }
  .course-header-desc { font-size: 12px; color: var(--muted); margin-top: 2px; }

  /* Lesson grid */
  .lesson-grid { padding: 24px 32px; display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 14px; }

  /* Lesson card */
  .lesson-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 18px; cursor: pointer; transition: transform 0.15s, border-color 0.2s, box-shadow 0.15s; position: relative; }
  .lesson-card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(33,60,68,0.1); }
  .lesson-card.done { border-color: var(--card-color, var(--light)); }
  .lesson-card.done::after { content: ''; position: absolute; inset: 0; border-radius: 12px; background: var(--card-color, var(--light)); opacity: 0.05; pointer-events: none; }
  .card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
  .lesson-num { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 10px; font-weight: 700; color: white; letter-spacing: 0.5px; }
  .check-btn { width: 24px; height: 24px; border-radius: 50%; border: 1.5px solid var(--border); background: transparent; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 12px; transition: all 0.15s; flex-shrink: 0; }
  .check-btn.done { color: white; }
  .lesson-title { font-family: 'Poppins', sans-serif; font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 8px; line-height: 1.4; }
  .lesson-preview { font-size: 11px; color: var(--muted); line-height: 1.6; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; margin-bottom: 12px; }
  .card-cta { font-size: 11px; font-weight: 500; }

  /* Lesson detail */
  .lesson-detail { display: none; padding: 0 32px 40px; }
  .lesson-detail.active { display: block; }
  .back-btn { background: none; border: none; cursor: pointer; font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 500; padding: 20px 0 16px; display: flex; align-items: center; gap: 6px; transition: opacity 0.15s; }
  .back-btn:hover { opacity: 0.7; }

  .lesson-hero { border-radius: 14px; padding: 24px 28px; margin-bottom: 20px; }
  .lesson-hero-num { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 10px; font-weight: 700; color: white; letter-spacing: 1px; margin-bottom: 12px; }
  .lesson-hero-title { font-family: 'Poppins', sans-serif; font-size: clamp(16px, 4vw, 22px); font-weight: 700; color: white; line-height: 1.3; }

  .detail-tabs { display: flex; border-bottom: 1px solid var(--border); margin-bottom: 20px; }
  .detail-tab { padding: 10px 20px; border: none; background: none; cursor: pointer; font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 400; color: var(--muted); border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all 0.15s; }
  .detail-tab.active { font-weight: 600; color: var(--tab-accent); border-bottom-color: var(--tab-accent); }

  .outline-box { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 24px 28px; }
  .outline-box p { font-size: 14px; line-height: 1.9; color: var(--text); }

  .practice-intro { border-left: 3px solid var(--tab-accent); padding: 4px 0 4px 16px; margin-bottom: 20px; }
  .practice-intro-label { font-size: 9px; font-weight: 600; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 4px; }
  .practice-intro-text { font-size: 13px; color: var(--muted); line-height: 1.6; }

  .task-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 16px 20px; margin-bottom: 10px; }
  .task-title { font-family: 'Poppins', sans-serif; font-size: 12px; font-weight: 600; color: var(--text); margin-bottom: 10px; }
  .task-list { padding-left: 18px; }
  .task-list li { font-size: 12px; color: var(--muted); line-height: 1.7; margin-bottom: 4px; }

  .reflection-box { border-radius: 10px; padding: 20px 24px; margin-top: 8px; }
  .reflection-label { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 10px; }
  .reflection-text { font-size: 13px; font-style: italic; line-height: 1.8; }

  .detail-footer { display: flex; flex-wrap: wrap; gap: 10px; justify-content: space-between; align-items: center; margin-top: 24px; padding-top: 20px; border-top: 1px solid var(--border); }
  .footer-back { background: none; border: 1px solid var(--border); border-radius: 8px; padding: 9px 18px; cursor: pointer; font-family: 'Inter', sans-serif; font-size: 12px; color: var(--muted); transition: all 0.15s; }
  .footer-back:hover { border-color: var(--muted); color: var(--text); }
  .mark-btn { padding: 10px 24px; border-radius: 8px; cursor: pointer; font-family: 'Poppins', sans-serif; font-size: 12px; font-weight: 600; border: 1.5px solid; transition: all 0.15s; }

  /* Video */
  .video-wrap { position: relative; padding-bottom: 56.25%; height: 0; border-radius: 10px; overflow: hidden; margin-bottom: 20px; background: #000; }
  .video-wrap iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
  .vid-btn { display: inline-flex; align-items: center; gap: 6px; font-size: 11px; font-weight: 600; padding: 5px 12px; border-radius: 20px; color: white; text-decoration: none; margin-top: 10px; }
  .vid-btn svg { width: 13px; height: 13px; fill: white; flex-shrink: 0; }

  /* Footer */
  footer { background: var(--dark); padding: 18px 32px; display: flex; justify-content: space-between; align-items: center; margin-top: 32px; }
  footer span { font-size: 11px; color: rgba(255,255,255,0.3); }

  @media (max-width: 768px) {
    .lesson-grid { padding: 20px 24px; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); }
    .lesson-detail { padding: 0 24px 36px; }
    .course-tabs { padding: 0 24px; }
    .course-header { padding: 14px 24px; }
    .progress-strip { padding: 10px 24px; }
  }
  @media (max-width: 600px) {
    header { padding: 0 16px; }
    .lesson-grid { padding: 16px; grid-template-columns: 1fr; }
    .lesson-detail { padding: 0 16px 32px; }
    .course-tabs { padding: 0 16px; }
    .course-header { padding: 14px 16px; }
    .progress-strip { padding: 10px 16px; }
    footer { padding: 16px; flex-direction: column; gap: 6px; text-align: center; }
  }
  @media (max-width: 400px) {
    .detail-footer { flex-direction: column; align-items: stretch; }
    .mark-btn, .footer-back { width: 100%; text-align: center; }
  }
  @media (min-width: 1100px) {
    .lesson-detail { max-width: 860px; margin: 0 auto; }
  }
</style>
</head>
<body>

<div class="gradient-bar"></div>

<header>
    <div class="logo">
    <div class="logo-asi">ASI</div>
    <div class="logo-divider"></div>
    <div class="logo-text">
      <div class="logo-sub">Clevertouch by Boxlight</div>
      <div class="logo-title">LYNX Whiteboard University</div>
    </div>
  </div>
<div class="header-progress">
    <div class="header-progress-label">Your progress</div>
    <div class="header-progress-count" id="hdr-count">0/24 lessons</div>
  </div>
</header>

<div class="progress-strip">
  <div class="progress-track"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
  <div class="progress-pct" id="prog-pct">0% complete</div>
</div>

<div id="main-view">
  <div class="course-tabs" id="course-tabs"></div>
  <div class="course-header" id="course-header"></div>
  <div class="lesson-grid" id="lesson-grid"></div>
</div>

<div id="detail-view" style="display:none">
  <div class="lesson-detail active" id="lesson-detail"></div>
</div>

<footer>
  <span>© ASI Solutions · LYNX Whiteboard University</span>
  <span>Clevertouch by Boxlight · Education Division</span>
</footer>

<script>
const COLORS = { setup: '#109aa9', c1: '#125960', c2: '#ffa100' };

const DATA = [
  { id: 'setup', label: 'App Setup & SSO', desc: 'Get LYNX installed and your account ready', lessons: [
    { n:'01', id:'s1', vid:'V_RI1l7aWtU', title:'Download LYNX and create an account',
      outline:'This lesson walks through the first setup steps for LYNX Whiteboard. It shows where to download the app on tablets, phones, laptops, and desktop devices, and explains when to use an app store compared with the LYNX website. It also demonstrates creating an account through the website so the app can be used across devices. By the end of this lesson, you should understand how to install LYNX correctly and why creating an account is an important part of getting started.',
      intro:'Get LYNX installed and ready on the device you are most likely to use.',
      tasks:[
        {t:'Choose the right download path', items:['Decide whether you are installing on a tablet, phone, laptop, or desktop device.','Go to the correct app store or the LYNX website and confirm you are downloading the official LYNX Whiteboard app.']},
        {t:'Install the app', items:['Complete the installation on one device and open the app once it finishes.','Check that it launches without errors and that you can see the home screen.']},
        {t:'Create your account', items:['Go to the LYNX website and create an account using your work details or preferred login method.','Confirm that your account is active and ready to use.']}
      ],
      refl:'How could completing this setup before training or teaching reduce delays and stress later?'
    },
    { n:'02', id:'s2', vid:'2Vq5-j9LHBA', title:'Create account with SSO',
      outline:'This lesson focuses on signing in to LYNX Whiteboard using single sign-on with a Google account. It shows the sign-in flow, how permission prompts appear, and how LYNX connects to an existing Google account rather than requiring a separate password. By the end of this lesson, you should feel confident using SSO as a fast and practical way to start using LYNX.',
      intro:'Sign in the way many staff would in a real school or workplace setup.',
      tasks:[
        {t:'Start the sign-in process', items:['Open the LYNX sign-in page on the website.','Select the Google sign-in option and notice you are not asked to create a separate LYNX password.']},
        {t:'Complete permissions', items:['Choose your work or test Google account and read each permission prompt before accepting.','Finish the sign-in and confirm it returns you to LYNX.']},
        {t:'Check access', items:['Look for your signed-in name or account details in the interface.','Reopen the app or site to make sure the sign-in holds between sessions.']}
      ],
      refl:'How could single sign-on remove setup barriers for staff who want to start teaching with LYNX quickly?'
    },
    { n:'03', id:'s3', vid:'c1QgnQrXD60', title:'Linking Drives',
      outline:'This lesson covers account housekeeping through the LYNX Cloud website, with a focus on linking cloud drives. It shows that some drives may already be linked if they were used to create the account, and demonstrates adding another drive such as OneDrive or Dropbox by working through the permissions process. The key idea is that linking drives makes your files easier to access across devices. By the end of this lesson, you should feel more confident linking a drive and understanding why it matters.',
      intro:'Connect one cloud location that genuinely matters to your day-to-day work.',
      tasks:[
        {t:'Open the web account area', items:['Go to the LYNX Cloud website, sign in, and navigate to the drives area.','Review whether a drive is already linked because of the way your account was created.']},
        {t:'Add another drive', items:['If relevant, link OneDrive or Dropbox and work through the permission prompts carefully.','Confirm the drive connection completes successfully.']},
        {t:'Check the result in LYNX', items:['Return to the app and confirm the linked drive is now accessible from the files area.']}
      ],
      refl:'How could linked drives make it easier to move between planning on one device and teaching on another?'
    }
  ]},
  { id: 'c1', label: 'Course 1: Essentials', desc: 'Master the core tools for everyday teaching', lessons: [
    { n:'01', id:'c1l1', vid:'AoF5ytErW6w', title:'Getting Started with LYNX Whiteboard',
      outline:'This lesson introduces LYNX Whiteboard as both a whiteboarding and presentation app. It explains that LYNX can run across phones, tablets, laptops, Chromebooks, and Clevertouch screens, and it highlights linked drives, file opening, editable notebook imports, media search, and interactive tools such as rulers, protractors, clocks, dice, and compasses. The focus is on understanding the range of what LYNX can do rather than mastering one tool. By the end of this lesson, you should have a clear picture of where LYNX fits into everyday teaching or presenting.',
      intro:'Explore LYNX as a flexible teaching space rather than just another app to learn.',
      tasks:[
        {t:'Open LYNX and identify its purpose', items:['Launch the app on your device and create a blank page.','Name two ways you could use it — for example, presenting a lesson, modelling a concept, or running an interactive activity.']},
        {t:'Explore what it can bring in', items:['Look for where linked drives or files would be accessed.','Think about one existing file you may want to open in LYNX in a real lesson.']},
        {t:'Explore built-in possibilities', items:['Find one area that suggests media, interactive tools, or maths resources.','Note one feature that could replace a separate app or website in a lesson you already teach.']}
      ],
      refl:'Which part of the LYNX feature set feels most useful for your own teaching or presenting context?'
    },
    { n:'02', id:'c1l2', vid:'deDts66pRbg', title:'Welcome to the Dashboard',
      outline:'This lesson focuses on the LYNX dashboard as the starting point for daily use. It shows what changes once you sign in, how sign-in can use your Google or Microsoft account, and where dashboard shortcuts lead, including the LYNX portal, activities, and recent updates. The lesson also frames the dashboard as the place where you confirm account status and launch into the wider LYNX ecosystem. By the end of this lesson, you should feel confident using the dashboard to begin work and access the main connected areas quickly.',
      intro:'Use the dashboard to prepare for smoother starts before class or training sessions.',
      tasks:[
        {t:'Sign in from the dashboard', items:['Open LYNX Whiteboard and sign in with your Google or Microsoft account.','Confirm that your name and account status appear on the dashboard.']},
        {t:'Explore the dashboard shortcuts', items:['Locate shortcuts such as the portal, activities, or update areas.','Open one of them so you understand where it leads and what it contains.']},
        {t:'Create a quick-start habit', items:['Create a new file from the dashboard.','Return to the dashboard and notice how it acts as a launch point for your work.']}
      ],
      refl:'How could starting from the dashboard help you begin lessons more calmly and with fewer clicks?'
    },
    { n:'03', id:'c1l3', vid:'EqNbmXi97Vc', title:'Opening Files',
      outline:'This lesson explains what happens when different file types are opened in LYNX Whiteboard. It shows that linked cloud drives and local folders can both be used, and makes clear that Google Docs, Google Slides, Word documents, and PowerPoints open in a PDF-style format, while SMART Notebook and ActivInspire files are more editable. By the end of this lesson, you should understand how to open files confidently and what level of editability to expect from different file types.',
      intro:'Practise opening real teaching files so you know what to expect before using them live.',
      tasks:[
        {t:'Open from a familiar location', items:['Go to the files area in LYNX and open one file from a local folder or linked drive.','Notice the steps needed to bring it into LYNX and how long the process takes.']},
        {t:'Compare file types', items:['Open a PDF or Word or PowerPoint file and observe how it appears in LYNX.','If available, compare it with a SMART Notebook or ActivInspire file and notice the differences.']},
        {t:'Plan for classroom use', items:['Choose one file you might use in class and decide whether you need it for display, annotation, or deeper editing.']}
      ],
      refl:'How could understanding file behaviour help you avoid surprises when teaching in front of a class?'
    },
    { n:'04', id:'c1l4', vid:'WpnFaCwUs-Y', title:'The Main Toolbar',
      outline:'This lesson introduces the main toolbar at the bottom of the screen and explains how it changes between normal use and presentation mode. It gives a tour of the key areas, including the selector, pen tools, text tools, editing tools, insert options, and page controls. The goal is not to master every feature at once, but to understand how the toolbar is organised so the rest of the app feels easier to navigate. By the end of this lesson, you should feel more confident locating the main tool groups and understanding their purpose.',
      intro:'Build a practical mental map of the toolbar before relying on it during live teaching.',
      tasks:[
        {t:'Identify the major sections', items:['Open a blank LYNX file and look across the bottom toolbar.','Name the broad areas you can see for selecting, writing, editing, inserting, and managing pages.']},
        {t:'Test one tool from each area', items:['Use a pen, create a text box, open an insert option, and open the page area.','Notice how the toolbar groups the main actions you need within reach.']},
        {t:'Compare with presentation mode', items:['Enter presentation mode and notice how the toolbar changes or simplifies.']}
      ],
      refl:'How could knowing the toolbar layout help you stay fluent and confident while teaching?'
    },
    { n:'05', id:'c1l5', vid:'bVZgr_o75mk', title:'Setting Up the App',
      outline:'This lesson focuses on settings choices you can make using LYNX Whiteboard on a device. It shows how to open the options area from either the dashboard or an open file, and it introduces the five main tabs, including general settings such as updates, account management, language, and interface toggles. The lesson treats setup as a practical way to make the app feel right before you start building content. By the end of this lesson, you should feel more confident adjusting the app to suit your workflow.',
      intro:'Shape the app around your workflow before building serious lesson content.',
      tasks:[
        {t:'Open the options area', items:['Access settings from the dashboard and then again from within an open file.','Notice that both paths lead to the same core options.']},
        {t:'Review the main tabs', items:['Look through the general tab and at least one other tab.','Identify where updates, account management, language, or interface toggles sit.']},
        {t:'Make one useful adjustment', items:['Change one setting that would genuinely improve your day-to-day experience with the app.']}
      ],
      refl:'How could a few thoughtful setup choices make LYNX easier to use under real classroom pressure?'
    },
    { n:'06', id:'c1l6', vid:'of7sJIfZyl4', title:'Floating Toolbars',
      outline:'This lesson explains why floating toolbars matter in LYNX Whiteboard. It contrasts the simple main toolbar at the bottom of the screen with the object-specific options that appear when you click items on the page. It also notes that different objects can show different bespoke controls, such as extra options for clocks or protractors. The lesson frames floating toolbars as a big part of what makes LYNX intuitive. By the end of this lesson, you should feel more confident using these nearby controls to work more efficiently.',
      intro:'Use floating toolbars to reduce unnecessary movement and keep your attention on the page.',
      tasks:[
        {t:'Trigger a floating toolbar', items:['Select an object such as a shape, image, or maths tool.','Look for the toolbar or options that appear nearby on the page.']},
        {t:'Make quick changes', items:['Use the floating toolbar to adjust one or two features of the selected object.','If possible, compare a standard object with a specialised one such as a clock or protractor.']},
        {t:'Compare with the main toolbar', items:['Notice how using the nearby options can reduce the number of steps you need to take.']}
      ],
      refl:'How could floating toolbars help you stay more responsive while teaching or presenting live?'
    },
    { n:'07', id:'c1l7', vid:'AjNkGABSEBE', title:'Pages Menu',
      outline:'This lesson covers the pages menu and the full range of settings it contains beyond page size. It shows how to set dimensions using presets such as A4 or custom values and swap orientation, and it introduces the Curtain and Spotlight display tools, Page Layouts for ready-made templates, Infinite Canvas with Radar View for open-ended canvases, the Edit Background layer for colour and grid patterns, and Enable Snapping for aligning objects to the grid. By the end of this lesson, you should feel confident adjusting page-level settings to match any teaching context.',
      intro:'Use the pages menu to set up a page that matches the way you want to teach or present.',
      tasks:[
        {t:'Set page size and orientation', items:['Change the page size using a preset such as A4 and apply it to all pages.','Swap the orientation and notice how it affects your content layout.']},
        {t:'Try the Curtain and Spotlight', items:['Add content to a page, turn on the Curtain, and practise revealing it gradually.','Switch to the Spotlight, adjust the size, and move it across the page.']},
        {t:'Explore canvas and background', items:['Turn on Infinite Canvas and move around the page using two fingers or the scroll controls.','Enter the Edit Background layer, add a grid pattern, and exit to see the result.']}
      ],
      refl:'How could the Curtain, Spotlight, and background tools change the way you set up a page before teaching?'
    },
    { n:'08', id:'c1l8', vid:'1Cl__yHo5mg', title:'Pages Navigation and Slider',
      outline:'This lesson looks closely at moving between pages and using the slider to manage a presentation. It shows the page count and forward/back arrows for basic navigation, how to open the slider by clicking the page numbers, and how to reorder slides by holding the up-down arrow and dragging. The hamburger menu on each thumbnail adds page management options including insert before or after, delete, copy, paste, duplicate across both layers, and save the page as an image. By the end of this lesson, you should feel more confident navigating quickly through a resource and keeping a lesson organised.',
      intro:'Use the page slider to manage a short sequence as if you were preparing a real lesson set.',
      tasks:[
        {t:'Build a small sequence', items:['Create three pages in a new file and give each a different title or heading.','Open the slider by clicking the page numbers and jump between pages using the thumbnails.']},

// State
let activeTab = 'setup';
let activeLesson = null;
let activeDTab = 'outline';
const done = JSON.parse(localStorage.getItem('lynx_done') || '{}');

function saveDone() { localStorage.setItem('lynx_done', JSON.stringify(done)); }
function total() { return DATA.reduce((s,c) => s + c.lessons.length, 0); }
function doneCount() { return Object.values(done).filter(Boolean).length; }
function courseOf(lid) { return DATA.find(c => c.lessons.some(l => l.id === lid)); }

function updateProgress() {
  const d = doneCount(), t = total(), p = Math.round(d/t*100);
  document.getElementById('hdr-count').textContent = d + '/' + t + ' lessons';
  document.getElementById('prog-fill').style.width = p + '%';
  document.getElementById('prog-pct').textContent = p + '% complete';
}

function renderTabs() {
  const course = DATA.find(c => c.id === activeTab);
  const col = COLORS[activeTab];
  const el = document.getElementById('course-tabs');
  el.innerHTML = DATA.map(c => {
    const cd = c.lessons.filter(l => done[l.id]).length;
    const act = c.id === activeTab;
    return `<button class="course-tab ${act ? 'active' : ''}" style="--tab-color:${COLORS[c.id]}" onclick="setTab('${c.id}')">
      ${c.label}
      <span class="tab-badge">${cd}/${c.lessons.length}</span>
    </button>`;
  }).join('');

  document.getElementById('course-header').innerHTML = `
    <div class="course-header-inner">
      <div class="course-color-bar" style="background:${col}"></div>
      <div>
        <div class="course-header-title">${course.label}</div>
        <div class="course-header-desc">${course.desc}</div>
      </div>
    </div>`;
}

function renderGrid() {
  const course = DATA.find(c => c.id === activeTab);
  const col = COLORS[activeTab];
  document.getElementById('lesson-grid').innerHTML = course.lessons.map(l => {
    const isDone = !!done[l.id];
    return `<div class="lesson-card ${isDone ? 'done' : ''}" style="--card-color:${col}" onclick="openLesson('${l.id}')">
      <div class="card-top">
        <span class="lesson-num" style="background:${col}">Lesson ${l.n}</span>
        <button class="check-btn ${isDone ? 'done' : ''}" style="${isDone ? `background:${col};border-color:${col}` : `border-color:#ccd5d8`}" onclick="event.stopPropagation();toggleDone('${l.id}')" aria-label="${isDone ? 'Mark as incomplete' : 'Mark as complete'}" aria-pressed="${isDone}">${isDone ? '✓' : ''}</button>
      </div>
      <div class="lesson-title">${l.title}</div>
      <div class="lesson-preview">${l.outline}</div>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-top:4px">
        <div class="card-cta" style="color:${col}">View lesson →</div>
      </div>
    </div>`;
  }).join('');
}

function openLesson(id) {
  const course = courseOf(id);
  const lesson = course.lessons.find(l => l.id === id);
  activeLesson = lesson;
  activeDTab = 'outline';
  document.getElementById('main-view').style.display = 'none';
  document.getElementById('detail-view').style.display = 'block';
  renderDetail();
  window.scrollTo(0,0);
}

function renderDetail() {
  const l = activeLesson;
  const course = courseOf(l.id);
  const col = COLORS[course.id];
  const isDone = !!done[l.id];

  let content = `
    <button class="back-btn" style="color:${col}" onclick="goBack()">← Back to ${course.label}</button>
    <div class="lesson-hero" style="background:${col}">
      <span class="lesson-hero-num" style="background:rgba(255,255,255,0.25)">Lesson ${l.n}</span>
      <div class="lesson-hero-title">${l.title}</div>
    </div>
    <div class="detail-tabs" style="--tab-accent:${col}">
      <button class="detail-tab ${activeDTab==='outline'?'active':''}" onclick="setDTab('outline')">Outline</button>
      ${l.vid ? `<button class="detail-tab ${activeDTab==='video'?'active':''}" onclick="setDTab('video')">▶ Watch</button>` : ''}
      <button class="detail-tab ${activeDTab==='practice'?'active':''}" onclick="setDTab('practice')">Practice</button>
    </div>`;

  if (activeDTab === 'video' && l.vid) {
    content += `<div class="video-wrap"><iframe src="https://www.youtube-nocookie.com/embed/${l.vid}?rel=0&modestbranding=1&playsinline=1" allowfullscreen loading="lazy" title="${l.title} — Lesson Video" sandbox="allow-scripts allow-same-origin allow-presentation allow-popups"></iframe></div>
    <div style="text-align:right;margin-bottom:8px"><a href="https://youtu.be/${l.vid}" target="_blank" class="vid-btn" style="background:${col}"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>Open on YouTube</a></div>`;
  } else if (activeDTab === 'outline') {
    content += `<div class="outline-box"><p>${l.outline}</p></div>`;
  } else {
    content += `
      <div class="practice-intro" style="border-color:${col}">
        <div class="practice-intro-label" style="color:${col}">Try this in your classroom or planning time</div>
        <div class="practice-intro-text">${l.intro}</div>
      </div>`;
    l.tasks.forEach((tk, i) => {
      content += `<div class="task-card">
        <div class="task-title">Task ${i+1}: ${tk.t}</div>
        <ul class="task-list">${tk.items.map(b => `<li>${b}</li>`).join('')}</ul>
      </div>`;
    });
    content += `<div class="reflection-box" style="background:${col}12;border:1px solid ${col}35">
      <div class="reflection-label" style="color:${col}">Reflection</div>
      <div class="reflection-text">${l.refl}</div>
    </div>`;
  }

  content += `<div class="detail-footer">
    <button class="footer-back" onclick="goBack()">← Back to lessons</button>
    <button class="mark-btn" style="border-color:${col};background:${isDone?col:'transparent'};color:${isDone?'white':col}" onclick="toggleDone('${l.id}')" aria-pressed="${isDone}">
      ${isDone ? '✓ Completed' : 'Mark as complete'}
    </button>
  </div>`;

  document.getElementById('lesson-detail').innerHTML = content;
}

function goBack() {
  activeLesson = null;
  document.getElementById('main-view').style.display = 'block';
  document.getElementById('detail-view').style.display = 'none';
  renderTabs();
  renderGrid();
}

function setTab(id) {
  activeTab = id;
  renderTabs();
  renderGrid();
}

function setDTab(t) {
  activeDTab = t;
  renderDetail();
}

function toggleDone(id) {
  done[id] = !done[id];
  saveDone();
  updateProgress();
  if (activeLesson && activeLesson.id === id) {
    renderDetail();
  } else {
    renderGrid();
    renderTabs();
  }
}

// Init
renderTabs();
renderGrid();
updateProgress();
</script>
